{% extends "main/index.html" %}
{% block title %}{{ details.title }}{% endblock %}
{% block content %}
<div class="features">
    <h1>{{ details.title }}</h1>
    
    <div style="text-align: center;">
        <a href="{{ details.github_link }}" style="color: #eb5959; font-size: 18px; text-decoration: none; display: inline-block; transition: transform 0.2s;">
            <li style="display: inline-block; list-style: none; padding: 10px;">
                <i class=""></i>Github Repository
            </li>
        </a>
    </div>

    <style>
        a:hover {
            transform: scale(1.1);
        }
    </style>

    <p>{{ details.full_text }}</p>

    {% if details.video %}
        <div style="text-align: center; margin-top: 20px;">
            <video width="640" height="360" controls>
                <source src="{{ details.video.url }}" type="video/mp4">
                Your browser does not support the video tag.
            </video>
        </div>
    {% endif %}
</div>
{% endblock %}
